<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualisasi 3D Bumi Realistis — WebGL</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ── WebGL canvas ─────────────────────────────────── -->
    <canvas id="glCanvas"></canvas>

    <!-- ── Visual overlays ──────────────────────────────── -->
    <div id="scanlines"></div>
    <div id="vignette"></div>

    <!-- ── UI overlay ───────────────────────────────────── -->
    <div id="overlay">
      <!-- corners -->
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <!-- title -->
      <div id="title-bar">
        <h1>
          Visualisasi <span>3D</span> Siklus Rotasi Bumi<br />
          &amp; Pergantian <span>Siang – Malam</span> · WebGL
        </h1>
      </div>

      <!-- HUD status -->
      <div id="hud">
        <div class="hud-item" id="hud-fps">-- FPS</div>
        <div class="hud-item" id="hud-rot">ROT 0.0°</div>
        <div class="hud-item" id="hud-tilt">TILT 23.5°</div>
        <div class="hud-item" id="hud-speed">SPD ×1.00</div>
      </div>

      <!-- drag hint -->
      <div id="hint">DRAG &amp; SCROLL untuk<br />memutar &amp; zoom</div>

      <!-- controls -->
      <div id="controls">
        <div class="ctrl-label">— Tampilan —</div>
        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-atm">Atmosfer</button>
          <button class="ctrl-btn" id="btn-clouds">Awan</button>
          <button class="ctrl-btn" id="btn-stars">Bintang</button>
          <button class="ctrl-btn" id="btn-wire">Wireframe</button>
        </div>

        <div class="ctrl-label">— Kecepatan Rotasi —</div>
        <div class="ctrl-row">
          <button class="ctrl-btn speed" id="btn-speeddown">◀ Lambat</button>
          <button class="ctrl-btn reset" id="btn-reset">Reset</button>
          <button class="ctrl-btn speed" id="btn-speedup">Cepat ▶</button>
        </div>
      </div>
    </div>
    <!-- #overlay -->

    <!-- ── Scripts (order matters) ──────────────────────── -->
    <script src="js/shaders.js"></script>
    <script src="js/mesh.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/integrator.js"></script>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const canvas = document.getElementById("glCanvas");
        Integrator.init(canvas);
      });
    </script>
  </body>
</html>
